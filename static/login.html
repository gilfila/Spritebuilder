<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Builder! - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sprite Builder!</h1>
            <p class="subtitle">Log in to start creating</p>
        </header>
        <section class="login-section">
            <input type="text" id="login-user" placeholder="Username" autocomplete="username">
            <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
            <input
                type="text"
                id="login-code"
                placeholder="6-digit code"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="6"
                autocomplete="one-time-code"
                hidden
            >
            <button id="login-btn" class="generate-btn">&#128274; Log In</button>
            <div id="login-error" class="error-msg" hidden></div>
        </section>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        var loginBtn = document.getElementById("login-btn");
        var loginUser = document.getElementById("login-user");
        var loginPass = document.getElementById("login-pass");
        var loginCode = document.getElementById("login-code");
        var loginError = document.getElementById("login-error");

        // Ask the server up front whether MFA is configured, so we can show
        // the code field. If the fetch fails, leave it hidden — the server
        // will tell us with mfa_required in the login response.
        fetch("/api/auth/config")
            .then(function (res) { return res.json(); })
            .then(function (data) {
                if (data && data.mfa_required) loginCode.hidden = false;
            })
            .catch(function () {});

        function doLogin() {
            loginError.hidden = true;
            fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: loginUser.value,
                    password: loginPass.value,
                    code: loginCode.value.trim()
                })
            })
                .then(function (res) {
                    return res.json().then(function (data) {
                        return { ok: res.ok, data: data };
                    });
                })
                .then(function (result) {
                    if (!result.ok) {
                        if (result.data && result.data.mfa_required) {
                            loginCode.hidden = false;
                            loginCode.focus();
                        }
                        loginError.textContent = (result.data && result.data.error) || "Login failed!";
                        loginError.hidden = false;
                        return;
                    }
                    localStorage.setItem("sprite_token", result.data.token);
                    if (result.data.mfa_setup_required) {
                        window.location.href = "/setup-mfa";
                    } else {
                        window.location.href = "/app";
                    }
                })
                .catch(function () {
                    loginError.textContent = "Could not connect. Try again!";
                    loginError.hidden = false;
                });
        }

        loginBtn.addEventListener("click", doLogin);
        [loginUser, loginPass, loginCode].forEach(function (el) {
            el.addEventListener("keydown", function (e) {
                if (e.key === "Enter") doLogin();
            });
        });
    });
    </script>
</body>
</html>
